name: 'Skillevator'
description: 'Runs a skill''s evaluations against the Copilot CLI and records the results.'

inputs:
  skill-name:
    description: 'Skill directory name under .github/skills/'
    required: false
    default: 'hello-user'
  model:
    description: 'Copilot model to use'
    required: false
    default: 'gpt-4.1'
  times:
    description: 'Number of runs per evaluation prompt'
    required: false
    default: '3'
  timeout:
    description: 'Seconds before a CLI call is killed'
    required: false
    default: '120'
  allowed-tools:
    description: 'Space-separated tools to allow (e.g. "shell(python) builtin"). Mirrors --allow-tool.'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Run evaluations
      shell: bash
      working-directory: ${{ github.workspace }}
      run: |
        args=(
          --skill-name "${{ inputs.skill-name }}"
          --model "${{ inputs.model }}"
          --times "${{ inputs.times }}"
          --timeout "${{ inputs.timeout }}"
        )
        for tool in ${{ inputs.allowed-tools }}; do
          args+=(--allow-tool "$tool")
        done
        python "${{ github.action_path }}/scripts/take_evaluation.py" "${args[@]}"

    - name: Assess evaluations
      shell: bash
      working-directory: ${{ github.workspace }}
      run: |
        python "${{ github.action_path }}/scripts/assess_evaluation.py" \
          --skill-name "${{ inputs.skill-name }}" \
          --model "${{ inputs.model }}" \
          --timeout 60
